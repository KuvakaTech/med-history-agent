version: "3.9"

# Copy backend/.env.example → backend/.env and fill in your API keys before running.
# See README.md for full setup instructions.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    # Create backend/.env from backend/.env.example before running
    env_file:
      - path: ./backend/.env
        required: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      BACKEND_CORS_ALLOW_ALL: "false"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8001
    depends_on:
      - backend

